<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Google OAuth Test</title>
  <style>body{font-family:Arial,Helvetica,sans-serif;padding:24px}</style>
</head>
<body>
  <h1>Google OAuth Test</h1>
  <p>Inicia el flujo OAuth con Google:</p>
  <button id="login">Login with Google</button>
  <p>After the provider redirects back to <code>/oauth/callback</code>, the server will show the user info.</p>
  <script>
    document.getElementById('login').addEventListener('click', function(){
      // Navegar al endpoint que inicia el flujo en el servidor
      window.location.href = '/oauth/google';
    });
  </script>
</body>
</html>

version: '3.8'

services:
  mariadb:
    image: mariadb:10.11
    container_name: moodle-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: moodle
      MYSQL_USER: moodleuser
      MYSQL_PASSWORD: moodlepass
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - ./moodle-init.sql:/docker-entrypoint-initdb.d/init.sql
      - mariadb_data_team:/var/lib/mysql
    networks:
      - moodle-network
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
  moodle:
    build: .
    container_name: moodle-app
    ports:
      - "8080:80"
    volumes:
      
      - ./backup_html:/var/www/html
      
      - ./backup_moodledata:/var/www/moodledata
    depends_on:
      - mariadb
    networks:
      - moodle-network
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: moodle-phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mariadb
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    depends_on:
      - mariadb
    networks:
      - moodle-network
    restart: unless-stopped

volumes:
  mariadb_data_team:
    driver: local

networks:
  moodle-network:
    driver: bridge